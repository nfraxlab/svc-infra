name: Release (tag + GitHub Release)

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Skip if commit is from bot (prevents loops)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semrel.outputs.released }}
      tag: ${{ steps.semrel.outputs.tag }}

    steps:
      # Use RELEASE_TOKEN (PAT with bypass branch protection) for pushing
      # Falls back to GITHUB_TOKEN if RELEASE_TOKEN is not set
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and semantic-release
        run: |
          python -m pip install --upgrade pip pipx
          pipx install "poetry==2.0.1"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry install --no-interaction --sync

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # python-semantic-release handles:
      # - Version bump in pyproject.toml (based on commit messages)
      # - Changelog update
      # - Commit + tag (--no-push: we push ourselves for reliable event delivery)
      # - GitHub Release creation
      #
      # RELEASE_TOKEN must be a PAT (Fine-grained) with:
      # - Repository access: This repository
      # - Permissions: Contents (Read and write)
      # - Settings: "Bypass branch protections" enabled
      - name: Semantic Release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Bump version locally without pushing (we control the push)
          # Bump version, commit, tag, push, and create GitHub Release in one step.
          # semantic-release version (without --no-push) handles all of this using
          # GH_TOKEN for auth. upload_to_vcs_release=true (default) creates the
          # GitHub Release automatically.
          poetry run semantic-release version 2>&1

          # Check if HEAD is now tagged by semantic-release
          TAG=$(git describe --exact-match HEAD 2>/dev/null || echo "")
          if [[ -n "$TAG" ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            # Upload built artifacts to the GitHub Release
            poetry run semantic-release publish
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No new version to release"
          fi

  # Publish to PyPI directly after a successful release.
  # This is the primary publish trigger — the tag-based trigger in
  # publish-pypi.yml serves only as a backup/manual fallback.
  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    permissions:
      contents: read
      id-token: write
